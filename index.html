<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fdfcff" />
  <meta name="theme-color" content="#fdfcff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#030712" media="(prefers-color-scheme: dark)">
  <title>SkyYou Weather</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4052/4052984.png" type="image/png">
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4052/4052984.png">
  <meta name="apple-mobile-web-app-title" content="SkyYou Weather" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-color: #fdfcff;
      --text-color: #1a1c1e;
    }

    body {
      background-color: #fdfcff;
    }

    html.dark {
      --bg-color: #030712;
      --text-color: #f9fafb;
    }

    html.dark body {
      background-color: #030712;
    }

    body {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    html,
    body,
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
    }

    /* Custom Animations for Loading Screen */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    .animate-breathe {
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes slide-up-fade {
      0% {
        transform: translateY(20px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-slide-up {
      animation: slide-up-fade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
